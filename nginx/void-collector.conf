server {
    server_name void.skyreel.art;

    # Hide server version
    server_tokens off;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://www.googletagmanager.com https://*.worldcoin.org; style-src 'self' 'unsafe-inline'; img-src 'self' data: https: blob:; connect-src 'self' https://*.worldcoin.org https://*.supabase.co wss://*.walletconnect.org https://*.walletconnect.org; frame-ancestors 'self' https://worldcoin.org https://*.worldcoin.org;" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), payment=()" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "no-referrer-when-downgrade" always;
    
    # Remove deprecated X-XSS-Protection (modern browsers use CSP)
    # add_header X-XSS-Protection "0" always;

    # Secure Cookies
    proxy_cookie_flags ~ secure HttpOnly SameSite=Strict;

    # Cache static assets
    location /_next/static {
        proxy_pass http://localhost:3010;
        proxy_http_version 1.1;
        proxy_cache_valid 200 365d;
        add_header Cache-Control "public, max-age=31536000, immutable";
        
        # Security headers for static assets too
        add_header X-Frame-Options "SAMEORIGIN" always;
        add_header X-Content-Type-Options "nosniff" always;
    }

    location /assets {
        proxy_pass http://localhost:3010;
        proxy_http_version 1.1;
        add_header Cache-Control "public, max-age=604800";
    }

    location / {
        proxy_pass http://localhost:3010;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    listen 443 ssl http2;
    ssl_certificate /etc/letsencrypt/live/void.skyreel.art/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/void.skyreel.art/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    if ($host = void.skyreel.art) {
        return 301 https://$host$request_uri;
    }

    listen 80;
    server_name void.skyreel.art;
    return 404;
}
